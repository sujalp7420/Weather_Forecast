spring.application.name=ai-weather-platform

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Weather}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Sujal}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Thymeleaf
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.error.whitelabel.enabled=false

# Logging
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.root=INFO
logging.level.com.weather=${APP_LOG_LEVEL:INFO}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# OpenWeatherMap (leave empty to use demo weather data)
weather.api.key=${f23bc78263a7b81445066e17641d7aed}
weather.api.url=${https://api.openweathermap.org/data/2.5}

spring.profiles.active=dev