<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Search Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:class="${weatherTheme}"
      th:attr="data-weather-condition=${weather != null ? weather.condition : 'Clouds'},
               data-weather-icon=${weather != null ? weather.icon : '03d'}">
<canvas id="weather-canvas" aria-hidden="true"></canvas>

<div class="page-content">
    <main class="auth-shell">
        <section class="glass-card auth-panel wide">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">Search Weather</h1>
                <a th:href="@{/dashboard}" class="btn btn-ghost">Dashboard</a>
            </div>
            <form class="search-bar" th:action="@{/weather/search}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="form-control form-control-lg glass-input" type="text" name="city" placeholder="Enter any city..." required>
                <button class="btn btn-glow px-4" type="submit">Search</button>
            </form>

            <div class="weather-result mt-4" th:if="${weather}">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <img th:src="@{'https://openweathermap.org/img/wn/' + ${weather.icon} + '@2x.png'}" alt="" width="72">
                    <div>
                        <h2 class="mb-1" th:text="${weather.city}">City</h2>
                        <p class="mb-0">
                            <strong style="font-size:2.5rem;font-weight:800" th:text="${#numbers.formatDecimal(weather.temperature, 1, 1) + '°'}">31°</strong>
                            <span class="condition-badge ms-2" th:text="${weather.condition}">Clouds</span>
                        </p>
                    </div>
                </div>
                <p th:text="${weather.aiSummary.aiSummary}">AI response</p>
                <a class="btn btn-glow" th:href="@{/dashboard(city=${weather.city})}">Open Live Dashboard</a>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/weather-effects.js}"></script>
</body>
</html>
