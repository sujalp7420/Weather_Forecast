<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favorite Cities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="weather-default" data-weather-condition="Clouds" data-weather-icon="03d">
<canvas id="weather-canvas" aria-hidden="true"></canvas>

<div class="page-content">
    <nav class="glass-nav mb-4">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <a class="brand-logo" th:href="@{/dashboard}"><span>&#9729;</span> Live Weather</a>
            <a class="btn btn-sm btn-ghost" th:href="@{/dashboard}">Dashboard</a>
        </div>
    </nav>
    <main class="container py-2 px-4">
        <h1 class="mb-4">Favorite Cities</h1>
        <section class="daily-grid">
            <div class="glass-card daily-card" th:each="favorite : ${favorites}">
                <span th:text="${favorite.country}">IN</span>
                <strong th:text="${favorite.cityName}">Mumbai</strong>
                <a class="btn btn-sm btn-glow mt-2" th:href="@{/dashboard(city=${favorite.cityName})}">Open</a>
            </div>
        </section>
        <p class="text-secondary mt-4" th:if="${#lists.isEmpty(favorites)}">No favorite cities yet.</p>
    </main>
</div>
<script th:src="@{/js/weather-effects.js}"></script>
</body>
</html>
