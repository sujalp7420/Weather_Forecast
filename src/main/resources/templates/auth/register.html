<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="weather-clear" data-weather-condition="Clear" data-weather-icon="01d">
<canvas id="weather-canvas" aria-hidden="true"></canvas>

<div class="page-content">
    <main class="auth-shell">
        <section class="glass-card auth-panel">
            <h1>Join Live Weather</h1>
            <p class="text-secondary">Save searches, track forecasts, and get AI-powered daily insights.</p>
            <div class="alert-danger-glass" th:if="${registrationError}">
                <p class="mb-0" th:text="${registrationError}">Registration failed.</p>
            </div>
            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="vstack gap-3 mt-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="form-control form-control-lg glass-input" type="text" th:field="*{fullName}" placeholder="Full name" required>
                <div class="text-danger small" th:errors="*{fullName}"></div>
                <input class="form-control form-control-lg glass-input" type="email" th:field="*{email}" placeholder="Email" required>
                <div class="text-danger small" th:errors="*{email}"></div>
                <input class="form-control form-control-lg glass-input" type="password" th:field="*{password}" placeholder="Password (min 8 chars)" required minlength="8">
                <div class="text-danger small" th:errors="*{password}"></div>
                <button class="btn btn-glow btn-lg" type="submit">Create Account</button>
            </form>
            <p class="mt-3 mb-0 text-center">Already registered? <a th:href="@{/login}">Sign in</a></p>
        </section>
    </main>
</div>
<script th:src="@{/js/weather-effects.js}"></script>
</body>
</html>
