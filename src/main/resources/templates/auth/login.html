<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="weather-clouds" data-weather-condition="Clouds" data-weather-icon="03d">
<canvas id="weather-canvas" aria-hidden="true"></canvas>

<div class="page-content">
    <main class="auth-shell">
        <section class="glass-card auth-panel">
            <h1>Welcome back</h1>
            <div class="alert-glass" th:if="${param.registered}">
                Registration successful — sign in to see live weather.
            </div>
            <div class="alert-glass" th:if="${param.reset}">
                Password updated. Please login.
            </div>
            <p class="text-secondary">Your live weather dashboard awaits.</p>
            <form th:action="@{/login}" method="post" class="vstack gap-3 mt-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="form-control form-control-lg glass-input" type="email" name="username" placeholder="Email" required>
                <input class="form-control form-control-lg glass-input" type="password" name="password" placeholder="Password" required>
                <button class="btn btn-glow btn-lg" type="submit">Sign In</button>
            </form>
            <div class="d-flex justify-content-between gap-3 mt-3">
                <a th:href="@{/forgot-password}">Forgot password?</a>
                <a th:href="@{/register}">Create account</a>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/weather-effects.js}"></script>
</body>
</html>
