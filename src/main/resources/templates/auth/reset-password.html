<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="weather-clouds night" data-weather-condition="Clouds" data-weather-icon="03n">
<canvas id="weather-canvas" aria-hidden="true"></canvas>

<div class="page-content">
    <main class="auth-shell">
        <section class="glass-card auth-panel">
            <h1>New password</h1>
            <form th:action="@{/reset-password}" method="post" class="vstack gap-3 mt-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="token" th:value="${token}">
                <input class="form-control form-control-lg glass-input" type="password" name="password" placeholder="New password" minlength="8" required>
                <button class="btn btn-glow btn-lg" type="submit">Update Password</button>
            </form>
        </section>
    </main>
</div>
<script th:src="@{/js/weather-effects.js}"></script>
</body>
</html>
