<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="weather-mist" data-weather-condition="Mist" data-weather-icon="50d">
<canvas id="weather-canvas" aria-hidden="true"></canvas>

<div class="page-content">
    <main class="auth-shell">
        <section class="glass-card auth-panel">
            <h1>Reset password</h1>
            <p class="text-secondary">Enter your registered email to create a reset token.</p>
            <div class="alert-glass" th:if="${resetToken}">
                <p class="mb-2">Development reset link:</p>
                <a th:href="@{/reset-password(token=${resetToken})}">Open reset form</a>
            </div>
            <form th:action="@{/forgot-password}" method="post" class="vstack gap-3 mt-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="form-control form-control-lg glass-input" type="email" name="email" placeholder="Email" required>
                <button class="btn btn-glow btn-lg" type="submit">Create Reset Link</button>
            </form>
            <p class="mt-3 mb-0"><a th:href="@{/login}">Back to login</a></p>
        </section>
    </main>
</div>
<script th:src="@{/js/weather-effects.js}"></script>
</body>
</html>
