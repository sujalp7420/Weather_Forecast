<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="weather-default" data-weather-condition="Clouds" data-weather-icon="03d">
<canvas id="weather-canvas" aria-hidden="true"></canvas>

<div class="page-content">
    <main class="auth-shell">
        <section class="glass-card auth-panel wide landing-hero">
            <span class="landing-badge">Live Weather Experience</span>
            <h1>Feel the weather before you step outside</h1>
            <p class="lead">Real-time forecasts, animated skies, AI-powered insights, and interactive analytics — all in one beautiful dashboard.</p>
            <div class="d-flex flex-wrap gap-3 justify-content-center mt-4">
                <a class="btn btn-glow btn-lg px-4" th:href="@{/login}">Get Started</a>
                <a class="btn btn-ghost btn-lg px-4" th:href="@{/register}">Create Account</a>
            </div>
            <div class="feature-pills">
                <span class="feature-pill">&#127780; Live sky effects</span>
                <span class="feature-pill">&#128200; Trend charts</span>
                <span class="feature-pill">&#128197; 7-day forecast</span>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/weather-effects.js}"></script>
</body>
</html>
